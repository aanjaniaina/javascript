<!--Create an if statement and check: 
if the number is less than 0.5, then display 'heads' in the console.
Else, display 'tails' in the console-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 1 G </title>
  </head>

  <body>
    <script>
      const randomNumber = Math.random();

      if (randomNumber < 0.5) {
        console.log('Heads');
      } else {
        console.log('Tails');
      }

    </script>
  </body>
</html>
