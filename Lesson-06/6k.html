<!--We'll improve the Cart Quantity project. First, make a copy of the project from exercise 5k (if you didn't do 5k, check the solutions.)

Let's say the cart has a maximum quantity of 10. Before updating the quantity, check if the quantity will be greater than 10:
If it will, display a popup saying 'The cart is full' and do not update the quantity.
Otherwise, update the quantity and console.log() it as usual-->

<!DOCTYPE html>
<html>
  <head>
    <title> Cart Quantity </title>
  </head>

  <body>
    <button onclick="
      console.log(`Cart quantity: ${cartQuantity}`);"> 
      Show Quantity 
    </button>

    <button onclick="
    //This next 3 lines does the same thing
      //cartQuantity = cartQuantity + 1;
      //cartQuantity += 1;
      if (cartQuantity + 1 > 10) {
        alert('The cart is full');
      } else {
        cartQuantity ++;
        console.log(`Cart quantity: ${cartQuantity}`);}"> 
      Add to Cart 
    </button>

    <button onclick="
      if (cartQuantity + 2 > 10) {
        alert('The cart is full')
      } else {
        cartQuantity += 2;
        console.log(`Cart quantity: ${cartQuantity}`);}"> 
      +2
    </button>

    <button onclick="
      if (cartQuantity + 3 > 10) {
        alert('The cart is full')
      } else {
        cartQuantity = cartQuantity + 3;
        console.log(`Cart quantity: ${cartQuantity}`);}"> 
      +3 
    </button>

    <button onclick="
      if (cartQuantity + 4 > 10) {
        alert('The cart is full')
      } else {
        cartQuantity +=4;
        console.log(`Cart quantity: ${cartQuantity}`);}">
      +4
    </button>

    <button onclick="
      if (cartQuantity + 5 > 10) {
        alert('The cart is full')
      } else {
        cartQuantity +=5;
        console.log(`Cart quantity: ${cartQuantity}`);}">
      +5
    </button>

    <button onclick="
      //cartQuantity = cartQuantity - 1;
      cartQuantity --;
      console.log(`Cart quantity: ${cartQuantity}`);">
      Remove from cart
    </button>

    <button onclick="
      //cartQuantity = cartQuantity - 2;
      cartQuantity -=2;
      console.log(`Cart quantity: ${cartQuantity}`);">
      -2
    </button>

    <button onclick="
      //cartQuantity = cartQuantity - 3;
      cartQuantity -=3;
      console.log(`Cart quantity: ${cartQuantity}`);">
      -3
    </button>

    <button onclick="
      cartQuantity = 0;
      console.log(`Cart was reset.`);
      console.log(`Cart quantity: ${cartQuantity}`);"> 
      Reset Cart 
    </button>

    <script>
      let cartQuantity = 0;
    </script>
  </body>
</html>
