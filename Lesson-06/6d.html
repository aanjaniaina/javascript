<!--Imagine an amusement park that has a discount for children (6years and younger) or senioers (65years and older).
Create a variable 'age' and save a person's age inside
Create an if-statement that checks if the person qualifies for a discount 'No discount' in the console.
Note: try to use the || operator in your solution
Try changing the 'age' variable to display different messages-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 1 D </title>
  </head>

  <body>
    <script>
      const age = '18';

      if (age <= 6 && age >= 65) {
        console.log('Discount');
      } else {
        console.log('No discount');
      } 
    </script>
  </body>
</html>
