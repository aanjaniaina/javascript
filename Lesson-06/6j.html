<!--(challenge) Instead of usinng if-statement in the previous exercises, try switching them into ternary operators (condition ? A B)-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 1 J </title>
  </head>

  <body>
    <script>
      const randomNumber = Math.random();

      const result = randomNumber;

      if (randomNumber <= 0.5) {
        console.log('Heads');
      } else if (randomNumber >= 0.5) {
        console.log('Tails');
      }

      const guess = 'heads';

      if (guess = result) {
        console.log('You win!');
      } else {
        console.log('You lose!');
      }

    </script>
  </body>
</html>
