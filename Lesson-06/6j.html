<!--(challenge) Instead of usinng if-statement in the previous exercises, try switching them into ternary operators (condition ? A B)-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 6 J </title>
  </head>

  <body>
    <script>
      const randomNumber = Math.random();

      const result = randomNumber < 0.5 ? 'Heads' : 'Tails';

      const guess = 'heads';
      console.log(guess === result ? 'You win!' : 'You lose!');

    </script>
  </body>
</html>
