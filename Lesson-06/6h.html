<!-- Instead of displaying 'heads' or tails' in the console, save the result in a variable called'result'-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 6 H </title>
  </head>

  <body>
    <script>
      const randomNumber = Math.random();
      let result;

      if (randomNumber < 0.5) {
        result = 'Heads';
      } else {
        result = 'Tails';
      }

    </script>
  </body>
</html>
