<!--Update convertLength to support converting between km,  miles, and also feet. Note: 1mile = 5280ft, 1km = 3281ft (approximately).
convertLength(5, 'miles', 'km') => '8km'
convertLength(5, 'miles', 'ft') => '26400ft'
convertLength(5, 'km', 'ft') => '16405ft' -->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 7 H </title>
  </head>
  <body>
    <script>
      function convertLength(length, from, to){
        if (from === 'km' && to === 'miles'){
          return `${length / 1.6} ${to}`;

        } else if (from === 'km' && to === 'ft'){
          return `${length * 3281} ${to}`;
        
        } else if (from === 'miles' && to === 'km'){
          return `${length * 1.6} ${to}`;

        } else if (from === 'miles' && to === 'ft'){
          return `${length * 5280} ${to}`;

        } else if (from === 'ft' && to === 'km'){
          return `${length / 3281} ${to}`;

        } else if (from === 'ft' && to === 'miles'){
          return `${length / 5280} ${to}`;

        } else if (from === to){
          return `${length} ${to}`;
        }
      }

      convertLength(50, 'miles', 'km');
      convertLength(32, 'km', 'miles');
      convertLength(50, 'km', 'km');

      convertLength(5, 'miles', 'km');
      convertLength(5, 'miles', 'ft');
      convertLength(5, 'km', 'ft');
    </script>
  </body>
</html>
