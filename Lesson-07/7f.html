<!--Create a function 'convertTemperature(degree, unit)' that takes a number and unit ('C' or 'F'), and converts it into the other unit.
convertTemperature(25, 'C') => '77F'
convertTemperature(86, 'F') => '30C'.
Note: return a string, and try to reuse the function from 7d and 7e.-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 7 F </title>
  </head>
  <body>
    <script>

      function convertToFahrenheit(celsius) {
        return (celsius * 9 / 5) + 32;
      }

      function convertToCelsius(fahrenheit) {
        return (fahrenheit - 32) * 5 / 9;
      }

      function convertTemperature(degrees, unit){
        if (unit === 'C'){
          const result = convertToFahrenheit(degrees);
          return `${result}F`;
        } else if (unit === 'F') {
          const result = convertToCelsius(degrees);
          return `${result}C`;
        }
      }
      convertTemperature(25, 'C');
      convertTemperature(86, 'F');
    </script>
  </body>
</html>
