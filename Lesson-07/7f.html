<!--Create a function 'convertTemperature(degree, unit)' that takes a number and unit ('C' or 'F'), and converts it into the other unit.
convertTemperature(25, 'C') => '77F'
convertTemperature(86, 'F') => '30C'.
Note: return a string, and try to reuse the function from 7d and 7e.-->

<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 7 F </title>
  </head>
  <body>
    <script>
      function convertTemperature(degree, unit){
        if (unit == 'C'){
          console.log(`Fahrenheit= ${degree} * 9 / 5 + 32`);
        } else if (unit == 'F') {
          console.log(`Celsius = ${degree} + 32 * 5 / 9`);
        }
      }
      convertTemperature(25, 'C');
      convertTemperature(86, 'F');
    </script>
  </body>
</html>
