<!--Create a copy of the Calculator project from exercise 5r (if you didn't do 5r, copy the code for 5r from the solutions).
Notice there's a lot of duplicated code in the buttons.
Create a function 'updateCalculation' and reuse the code.-->

<!DOCTYPE html>
<html>
  <head>
    <title> Calculator </title>
  </head>

  <body>
    <p>
      <button onclick="
        return updateCalculation('1');"> 
        1 
      </button>

      <button onclick="
        return updateCalculation('2');"> 
        2 
      </button>

      <button onclick="
        return updateCalculation('3');"> 
        3 
      </button>

      <button onclick="
        return updateCalculation(' + ');"> 
        + 
      </button>
    </p>

    <p>
      <button onclick="
        return updateCalculation('4');"> 
        4 
      </button>

      <button onclick="
        return updateCalculation('5');"> 
        5 
      </button>

      <button onclick="
        return updateCalculation('6');"> 
        6 
      </button>

      <button onclick="
        return updateCalculation(' - ');">
        - 
      </button>
    </p>

    <p>
      <button onclick="
        return updateCalculation('7');"> 
        7 
      </button>

      <button onclick="
        return updateCalculation('8');"> 
        8 
      </button>

      <button onclick="
        return updateCalculation('9');"> 
        9 
      </button>

      <button onclick="
        return updateCalculation(' * ');"> 
        * 
      </button>
    </p>

    <p>
      <button onclick="
      return updateCalculation('0');">
        0 
      </button>

      <button onclick="
        return updateCalculation('.');"> 
        . 
      </button>

      <button onclick="
        eval(calculation);
        calculation =eval(calculation);
        console.log(calculation);"> 
        = 
      </button>

      <button onclick="
        return updateCalculation('/');"> 
        / 
      </button>      
    </p>

    <p>
      <button onclick="
      calculation = '';
      console.log(calculation);">
        Clear
      </button>
    </p>
    

    <script>
      let calculation = "";

      function updateCalculation(value) {
        calculation += value;
        console.log(calculation);
      }
    </script>
  </body>
</html>
